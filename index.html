<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LTS Research</title>
<style>
body{font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#1d1d1f;color:#f5f5f7;text-align:center}
.msg{font-size:18px;line-height:1.6}
a{color:#0071e3;text-decoration:none}
</style>
</head>
<body>
<div class="msg" id="msg">LTS Research を開いています...</div>
<script>
(function(){
  var q = new URLSearchParams(window.location.search).get('q') || '';
  var scheme = 'com.miyabiyaka.lts-research://search?q=' + encodeURIComponent(q);
  window.location.href = scheme;
  setTimeout(function(){
    document.getElementById('msg').innerHTML =
      'アプリが開かない場合:<br><a href="' + scheme + '">ここをタップ</a>';
  }, 2000);
})();
</script>
</body>
</html>
